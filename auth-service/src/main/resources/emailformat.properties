mail.template.register.subject=Account Registration Successful

mail.template.register.body=<html><body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; color: #333;">\
<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); padding: 20px;">\
<h2 style="text-align: center; color: #28a745;">Registration Successful</h2>\
<p>Hello {{username}},</p>\
<p>Your account has been successfully registered on the NoteApp system.</p>\
<p>We wish you a great experience using our service.</p>\
<p style="text-align: right; font-size: 16px; color: #555;">Best regards,</p>\
<p style="text-align: right; font-size: 16px; color: #28a745;">Support Team</p>\
</div>\
<div style="text-align: center; padding: 10px; font-size: 12px; color: #777;">\
<p>This email was sent automatically. Please do not reply.</p>\
</div>\
</body></html>



mail.template.change-password-otp.subject=Your OTP Code for Password Change

mail.template.change-password-otp.body=<html><body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; color: #333;">\
<div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">\
<h2 style="text-align:center; color:#007bff;">Password Change OTP</h2>\
<p>Hello {{username}},</p>\
<p>Use the OTP below to continue changing your password:</p>\
<div style="text-align:center; margin: 24px 0;">\
<span style="font-size:30px; font-weight:bold; letter-spacing:5px; color:#007bff;">{{otp}}</span>\
</div>\
<p>This OTP will expire in {{expiredMinutes}} minutes.</p>\
<p>If you did not make this request, please ignore this email.</p>\
<p style="margin-top:24px;">Best regards,<br><b>Support Team</b></p>\
</div>\
<p style="text-align:center; font-size:12px; color:#777; margin-top:12px;">This email was sent automatically. Please do not reply.</p>\
</body></html>

mail.template.forgot-password-otp.subject=Password Reset Verification Code

mail.template.forgot-password-otp.body=<html><body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; color: #333;">\
<div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">\
<h2 style="text-align:center; color:#007bff;">Verify Your Password Reset Request</h2>\
<p>Hello {{username}},</p>\
<p>You requested to reset your password.</p>\
<p>Please enter the OTP below to verify your request:</p>\
<div style="text-align:center; margin: 24px 0;">\
<span style="font-size:30px; font-weight:bold; letter-spacing:5px; color:#007bff;">{{otp}}</span>\
</div>\
<p>This code is valid for {{expiredMinutes}} minutes.</p>\
<p>If you did not request this, you can safely ignore this email.</p>\
<p style="margin-top:24px;">Best regards,<br><b>Support Team</b></p>\
</div>\
<p style="text-align:center; font-size:12px; color:#777; margin-top:12px;">This is an automated email. Please do not reply.</p>\
</body></html>